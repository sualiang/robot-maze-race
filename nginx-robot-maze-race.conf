# 机器狗竞速赛事 - Nginx 生产配置
# 适用于：腾讯云服务器
# 部署位置：/etc/nginx/sites-available/robot-maze-race
#
# 使用前请将 DOMAIN 替换为正式域名
# 如果已有 SSL 证书，取消 HTTPS 相关注释

# ---- 可选：HTTPS（推荐） ----
# server {
#     listen 80;
#     server_name DOMAIN;
#     return 301 https://$host$request_uri;
# }
#
# server {
#     listen 443 ssl http2;
#     server_name DOMAIN;
#
#     ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;

server {
    listen 80;
    server_name DOMAIN;

    # 前端静态文件
    root /var/www/robot-maze-race;
    index index.html;

    # -------- API 反向代理 --------
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------- WebSocket 代理（大屏 + 裁判端） --------
    location /ws/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # -------- 微信邀请链接 → 直接 OAuth 静默授权（不走 SPA） --------
    # 仅 amberrobot.com.cn（微信 OAuth 回调域名）需要此规则
    # 1. 微信 UA + 无 code 参数 → 302 到微信 OAuth
    # 2. 有 code 参数（OAuth 回调）或非微信 → 正常走 SPA
    location /referee/invite {
        set $wx_oauth "";
        if ($http_user_agent ~* "MicroMessenger") {
            set $wx_oauth "1";
        }
        if ($arg_code = "") {
            set $wx_oauth "${wx_oauth}1";
        }
        if ($wx_oauth = "11") {
            return 302 "https://open.weixin.qq.com/connect/oauth2/authorize?appid=wx22a4891531ce5fe7&redirect_uri=https%3A%2F%2Famberrobot.com.cn%2Freferee%2Finvite%3Ftoken%3D$arg_token&response_type=code&scope=snsapi_base&state=invite&connect_redirect=1#wechat_redirect";
        }
        try_files /index.html =404;
    }

    # -------- SPA 路由 --------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------- 静态文件缓存 --------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

